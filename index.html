<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardstyle Distortion Plugin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="plugin-container">
        <div class="header">
            <h1>⚡ DISTORTION</h1>
            <p class="tagline">Hardstyle Edition</p>
        </div>

        <!-- Knobs Control Panel -->
        <div class="knobs-panel">
            <!-- PRE Knob -->
            <div class="knob-group">
                <div class="knob" id="driveKnob">
                    <div class="knob-pointer"></div>
                </div>
                <input type="range" id="drive" min="0" max="100" value="50" class="knob-input">
                <label class="knob-label">DRIVE</label>
                <span class="knob-value" id="driveValue">50</span>
            </div>

            <!-- THRESH Knob -->
            <div class="knob-group">
                <div class="knob" id="toneKnob">
                    <div class="knob-pointer"></div>
                </div>
                <input type="range" id="tone" min="0" max="100" value="50" class="knob-input">
                <label class="knob-label">TONE</label>
                <span class="knob-value" id="toneValue">50</span>
            </div>

            <!-- MIX Knob -->
            <div class="knob-group">
                <div class="knob" id="outputKnob">
                    <div class="knob-pointer"></div>
                </div>
                <input type="range" id="output" min="0" max="100" value="70" class="knob-input">
                <label class="knob-label">MIX</label>
                <span class="knob-value" id="outputValue">70</span>
            </div>

            <!-- POST Knob -->
            <div class="knob-group">
                <div class="knob" id="masterKnob">
                    <div class="knob-pointer"></div>
                </div>
                <input type="range" id="master" min="0" max="100" value="80" class="knob-input">
                <label class="knob-label">POST</label>
                <span class="knob-value" id="masterValue">80</span>
            </div>
        </div>

        <!-- LED Display -->
        <div class="display-section">
            <div class="led-display">
                <span class="led-label">TYPE:</span>
                <div class="led-buttons">
                    <button class="type-btn active" data-type="soft">SOFT</button>
                    <button class="type-btn" data-type="hard">HARD</button>
                    <button class="type-btn" data-type="raw">RAW</button>
                </div>
            </div>
            <div class="indicators">
                <div class="led" id="clippingLed"></div>
                <span class="led-text">CLIP</span>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="button-section">
            <button id="powerBtn" class="power-btn active">PWR</button>
            <button id="resetBtn" class="reset-btn">RST</button>
        </div>

        <!-- Audio Controls -->
        <div class="audio-section">
            <input type="file" id="audioInput" accept="audio/*" style="display: none;">
            <button id="loadAudioBtn" class="audio-btn">LOAD</button>
            <button id="playBtn" class="audio-btn">PLAY</button>
            <button id="stopBtn" class="audio-btn">STOP</button>
        </div>
    </div>

    <script src="distortion.js"></script>
    <script src="knobs.js"></script>
</body>
</html>
